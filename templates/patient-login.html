<!DOCTYPE html>
<html>
<head>
    <title>Patient Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="overlay">

    <div class="login-box">

        <h1>Patient Login 🩺</h1>

        <form method="POST" action="/login-patient">

            <input
                type="email"
                name="email"
                placeholder="Patient Email"
                required
            >

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <br><br>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
